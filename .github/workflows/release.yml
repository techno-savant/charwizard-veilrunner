name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout charwizard-veilrunner
        uses: actions/checkout@v4
        with:
          path: charwizard-veilrunner

      # charwizard-core source is resolved via ../charwizard-core/src at build time
      - name: Checkout charwizard-core
        uses: actions/checkout@v4
        with:
          repository: techno-savant/charwizard-core
          path: charwizard-core

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: charwizard-veilrunner/package-lock.json

      - run: npm ci
        working-directory: charwizard-veilrunner

      - name: Type check
        run: npm run typecheck
        working-directory: charwizard-veilrunner

      - name: Build
        run: npm run build
        working-directory: charwizard-veilrunner

      - name: Compile packs from source
        run: npm run pack
        working-directory: charwizard-veilrunner

      - name: Set version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch module.json version
        working-directory: charwizard-veilrunner
        run: |
          jq --arg v "${{ steps.version.outputs.value }}" '.version = $v' module.json > _m.json
          mv _m.json module.json

      - name: Create module.zip
        working-directory: charwizard-veilrunner
        run: zip -r module.zip module.json dist/ packs/ styles/ templates/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            charwizard-veilrunner/module.json
            charwizard-veilrunner/module.zip
          generate_release_notes: true
